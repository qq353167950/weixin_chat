# 推送自动打包桌面客户端（Windows exe + 安装包 / macOS .app）
#
# 触发方式：
#   - push 到 main / master：构建并上传 Artifact（Actions 页面下载，保留 30 天）
#   - push 形如 v1.0.0 的 tag：构建并自动创建 GitHub Release，三个产物作附件
#   - 手动触发（workflow_dispatch）
#
# 产物：
#   wechat-assistant.exe                 Windows 绿色版（win10/win11）
#   wechat-assistant-setup-vX.Y.Z.exe    Windows 安装包（选目录/桌面快捷方式/卸载器）
#   wechat-assistant-macos.zip           macOS .app（Intel/Apple Silicon 由 runner 架构决定）
#
# 注意：本项目验证均在本地完成（selftest + 实测），CI 仅负责打包分发。

name: 打包桌面客户端

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 安装依赖
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt pyinstaller

      - name: 离线冒烟自测（排版/封面/预览，不调外部 API）
        run: python scripts/selftest.py

      - name: 校验版本号与 tag 一致（仅 tag 触发）
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tagVer = "$env:GITHUB_REF" -replace "refs/tags/v",""
          $codeVer = python -c "import sys; sys.path.insert(0,'scripts'); from version import __version__; print(__version__)"
          if ($tagVer -ne $codeVer) {
            throw "版本不一致：tag=v$tagVer 但 version.py=$codeVer。请先更新 scripts/version.py 再打 tag。"
          }
          Write-Host "版本一致：v$codeVer"

      - name: PyInstaller 打包 exe
        run: pyinstaller build.spec --noconfirm --clean

      - name: 冒烟验证 exe 可启动（--server 模式）
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath "dist\公众号助手.exe" -ArgumentList "--server" -PassThru -WorkingDirectory (New-Item -ItemType Directory -Path "$env:TEMP\exe-smoke" -Force)
          Start-Sleep -Seconds 20
          try {
            $resp = Invoke-WebRequest -Uri "http://127.0.0.1:8093/" -UseBasicParsing -TimeoutSec 10
            if ($resp.StatusCode -ne 200) { throw "首页返回 $($resp.StatusCode)" }
            $state = Invoke-WebRequest -Uri "http://127.0.0.1:8093/api/state" -UseBasicParsing -TimeoutSec 10
            if ($state.StatusCode -ne 200) { throw "/api/state 返回 $($state.StatusCode)" }
            Write-Host "exe 启动冒烟通过"
          } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }

      - name: 确定版本号
        id: ver
        shell: pwsh
        run: |
          $v = if ("$env:GITHUB_REF" -like "refs/tags/v*") { "$env:GITHUB_REF" -replace "refs/tags/v","" } else { "0.0.0-dev" }
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: 安装 Inno Setup 中文语言文件
        shell: pwsh
        run: |
          $dest = "${env:ProgramFiles(x86)}\Inno Setup 6\Languages\ChineseSimplified.isl"
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/is-6_5_1/Files/Languages/Unofficial/ChineseSimplified.isl" -OutFile $dest
          if (-not (Test-Path $dest)) { throw "中文语言文件下载失败" }

      - name: 编译安装包（Inno Setup）
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "installer\installer.iss"
          Get-ChildItem dist

      - name: 统一产物文件名（Release 附件不支持中文）
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          Copy-Item "dist\公众号助手.exe" "dist\wechat-assistant.exe"
          Copy-Item "dist\公众号助手-安装包-v$env:APP_VERSION.exe" "dist\wechat-assistant-setup-v$env:APP_VERSION.exe"

      - name: 上传构建产物（Artifact）
        uses: actions/upload-artifact@v4
        with:
          name: wechat-assistant-windows
          path: |
            dist/wechat-assistant.exe
            dist/wechat-assistant-setup-*.exe
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 安装依赖
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt pyinstaller

      - name: 离线冒烟自测
        run: python scripts/selftest.py

      - name: PyInstaller 打包 .app
        run: pyinstaller build.spec --noconfirm --clean

      - name: 冒烟验证 .app 内可执行文件可启动（--server 模式）
        run: |
          "./dist/公众号助手.app/Contents/MacOS/公众号助手" --server > smoke.log 2>&1 &
          APP_PID=$!
          for i in $(seq 1 40); do
            sleep 1
            curl -sf --noproxy '*' http://127.0.0.1:8093/ > /dev/null && break
          done
          if ! curl -sf --noproxy '*' http://127.0.0.1:8093/ > /dev/null; then
            echo "首页请求失败，启动日志："; cat smoke.log; kill $APP_PID 2>/dev/null; exit 1
          fi
          curl -sf --noproxy '*' http://127.0.0.1:8093/api/state > /dev/null || { echo "/api/state 请求失败"; cat smoke.log; kill $APP_PID 2>/dev/null; exit 1; }
          echo "mac 启动冒烟通过"
          kill $APP_PID

      - name: 压缩 .app（保留可执行权限）
        run: cd dist && ditto -c -k --keepParent "公众号助手.app" wechat-assistant-macos.zip

      - name: 上传构建产物（Artifact）
        uses: actions/upload-artifact@v4
        with:
          name: wechat-assistant-macos
          path: dist/wechat-assistant-macos.zip
          retention-days: 30

  release:
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码（读 RELEASE_NOTES.md）
        uses: actions/checkout@v4

      - name: 下载全部产物
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - name: 提取本版本更新说明
        id: notes
        run: |
          VER="${GITHUB_REF#refs/tags/}"
          # 取 RELEASE_NOTES.md 中 "## vX.Y.Z" 到下一个 "## " 之间的条目行
          NOTES=$(awk -v ver="## $VER" '
            $0 == ver {found=1; next}
            found && /^## / {exit}
            found && /^- / {print}
          ' RELEASE_NOTES.md)
          if [ -z "$NOTES" ]; then
            NOTES="- 其他修复与优化"
          fi
          {
            echo "body<<NOTES_EOF"
            echo "$NOTES"
            echo ""
            echo "---"
            echo "下载：Windows 用 \`setup\` 安装版（推荐）或绿色版 exe；macOS 解压 zip 拖入应用程序。"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/wechat-assistant-setup-*.exe
            dist/wechat-assistant.exe
            dist/wechat-assistant-macos.zip
          body: ${{ steps.notes.outputs.body }}
